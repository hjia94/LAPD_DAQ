# Example experiment_config.ini for LAPD_DAQ
# (the .ini extension makes VS Code and most editors color sections, keys,
#  values, and comments differently; the parser accepts any extension.)
#
# Copy this file to experiment_config.ini and edit it for your data run. The active defaults are
# intentionally small so the hardware diagnostic checks can be run on the
# instrument PC without starting a full scan.
#
# =============================================================================
# FORMATTING RULES (read once)
# =============================================================================
# - Values are taken LITERALLY. Do NOT wrap values in quotes or brackets.
#       Correct:  motion_groups = Hades, Athena
#       Wrong:    motion_groups = "Hades, Athena"   (the quotes become part of
#                                                     the value and it fails)
#       Wrong:    motion_groups = [Hades]
# - Keep comments on their OWN line. Prefer not to write "#" after a value.
#   (The loaders strip trailing "# ..." comments, but an own-line comment is
#   always unambiguous.)
# - Sections may appear in ANY order.
# - Multi-line values (e.g. the experiment description) must indent every
#   continuation line by at least one space. A line starting in column 0 ends
#   the value.
#
# =============================================================================
# BMOTION QUICK START (the common modern workflow: Data_Run_bmotion.py)
# =============================================================================
# The bmotion workflow reads ONLY these sections from this file:
#       [experiment]  [nshots]  [scopes]  [scope_ips]  [channels]  [bmotion]
# The actual probe motion (planes, drives, motion lists, transforms) is defined
# in the separate bmotion TOML file, NOT here. [bmotion] below only selects
# which physical drives run and in which direction.
#
# The [position], [motor_ips], [camera_config], and [raspberry_pi] sections are
# LEGACY: they are used by the older direct-grid / camera modes
# (--mode grid/camera/dropper), not by the bmotion workflow. A bmotion user can
# ignore them.


[storage]
# OPTIONAL. Enables the parallel two-process acquisition pipeline.
#
# When BOTH keys below are set, Data_Run_bmotion.py writes each shot to the
# fast local `spool_dir` (raw int16 bin files) instead of the HDF5 file, and a
# separate `Offload_Run.py` process copies those shots into the HDF5 file under
# `hdf5_dir` on the slower/larger disk, verifies each write by reading it back,
# and deletes the spooled copy. This keeps the scopes from waiting on the slow
# output disk.
#
# Leave this section out (or blank) to use the legacy single-process path,
# which writes the HDF5 file directly.
#
# Both keys are DIRECTORIES, not file paths. The HDF5 FILENAME is always
# derived from [experiment] name as <hdf5_dir>/<name>_<YYYY-MM-DD>.hdf5 (the
# same name the offload process targets). `hdf5_path` is accepted as a
# deprecated alias for `hdf5_dir` and is likewise treated as a directory.
#
# IMPORTANT: spool_dir and hdf5_dir should live on DIFFERENT physical disks
# (e.g. spool on a local SSD, hdf5 on a USB 3.0 / network drive). Otherwise the
# split provides no speed benefit.
#
# spool_dir = D:\spool
# hdf5_dir = E:\Shadow data\Pat
#
# Backpressure (optional safety valve). If the offload process can't keep up
# (slow target disk, or Offload_Run.py not running), the spool would otherwise
# fill the local disk. Acquisition pauses before a shot when EITHER limit is hit
# and resumes once the offload drains enough. Set a value <= 0 to disable that
# check. Defaults: max_pending_shots = 1000, min_free_gb = 5.
# max_pending_shots = 1000
# min_free_gb = 5

[acquisition]
# OPTIONAL. Per-shot parallelism. All three keys default to true when the
# section/key is omitted; set to false to fall back to the sequential behaviour
# (e.g. to A/B the timing, or if a scope misbehaves). With a single scope every
# flag is a no-op.
#
# parallel_scope_arm: arm all scopes for the next trigger concurrently (one
#   thread per scope) instead of one after another. Arming a LeCroy scope is
#   several blocking round-trips, so serial arming lets the first scope go live
#   well before the last is ready; at high rep rates a trigger edge in that gap
#   is caught by some scopes and missed by others, desyncing the run by a shot.
#   Concurrent arming keeps all scopes live within a tight window. Recommended
#   true for any multi-scope run.
parallel_scope_arm = true
#
# parallel_scope_read: read each scope's waveform for a shot concurrently. Each
#   scope has its own network connection, so this overlaps the transfers and
#   shortens per-shot time with 2+ scopes.
parallel_scope_read = true
#
# parallel_spool_write: when spooling (see [storage]), write each scope's raw
#   bin/header files concurrently. Good on an SSD/NVMe spool disk; if the spool
#   disk is a single spinning HDD, concurrent writes can cause seek thrashing --
#   set this false in that case (the read/arm gains above are unaffected).
parallel_spool_write = true

[nshots]
# num_duplicate_shots: number of shots taken at EACH motion position.
# Integer only. Keep at 1 for diagnostics; increase for a real acquisition.
num_duplicate_shots = 1
# num_run_repeats is used by the legacy grid path only. The bmotion workflow
# does NOT read it (it does not repeat the whole scan).
num_run_repeats = 1

[bmotion]
# Consumed only by Data_Run_bmotion.py. This section selects a subset of the
# motion groups defined in the bmotion TOML and the direction to traverse each.
# If this section is omitted entirely: all motion groups run forward, interleaved.
#
# --- motion_groups ---
# Select which physical drives to run. Drives are identified by DRIVE NAME,
# matched case-insensitively, e.g. one of:
#       Hades   Athena   Hermes   Apollo
# (Each name maps to a physical drive system via the TOML's
#  motion_group.<X>.drive.name field.)
#
# Accepted forms:
#   - "all" or blank            -> every motion group in the TOML
#   - comma- or space-separated drive names, e.g.:
#         motion_groups = Hades, Athena
#         motion_groups = hades athena      (case-insensitive)
#
# No quotes, no brackets. An unknown name raises an error that lists the drive
# names available in the loaded TOML. (The older TOML motion-group index form,
# e.g. "0, 2", still works as a fallback, but drive names are preferred.)
#
# --- direction ---
# Accepted forms:
#   - a bare word applied to ALL selected drives:   forward   or   backward
#   - a per-drive mapping, e.g.:   Hades=forward, Athena=backward
#     Selected drives not listed default to forward. A drive that is not in
#     motion_groups raises an error.
#
# --- execution_order ---
#   - "interleaved" (default): every motion group advances together; at each
#     motion-list index, every group moves to that index, then nshots are taken.
#   - "sequential": one motion group runs its full scan to completion before
#     the next starts. Idle groups are not recorded during another group's phase.
motion_groups = all
direction = forward
execution_order = interleaved
#
# --- motor-error recovery (optional; spooled/parallel runs) ---
# If a probe move fails or silently misses its target mid-scan, the run retries
# through an escalating recovery ladder (soft-stop -> alarm_reset/limit-backoff
# -> wait for reconnect) before giving up. If recovery is exhausted the run
# stops cleanly and the HDF5 is finalized with all shots taken so far (the spool
# RUN_COMPLETE is flagged terminated_early). Defaults shown; all optional.
# move_attempts = 3
# move_settle_timeout_s = 30
# reconnect_timeout_s = 60
# position_tol = 0.5


[experiment]
# name: the experiment name used to build the output HDF5 filename, which is
# <base_path>/<name>_<YYYY-MM-DD>.hdf5. The Data_Run entry scripts take only a
# base path and read this name after parsing. (In the parallel pipeline, an
# explicit [storage] hdf5_path overrides this.) Defaults to 'experiment'.
name = 00_speed_test
#
# Free-text, human-readable run description, stored verbatim in the HDF5 file.
# It may span multiple lines: indent every continuation line by at least one
# space (any amount). A line starting in column 0 ends the description.
description = LAPD_DAQ hardware diagnostic template
    Purpose:
    - Run one real-scope Data_Run-style check without motor movement.
    - Run one real-motor Data_Run-style check with fake delayed scope data.

    Edit this description for the actual experiment before production runs.

[scopes]
# Display name = free-text description for each scope. The name on the left
# (e.g. BdotScope) is the scope key referenced by [scope_ips] and [channels].
BdotScope = LeCroy HDO4104 - 4GHz 20GS/s
XrayScope = LeCroy regular black scope

[channels]
# Keys MUST be of the form ScopeName_C<n>, where ScopeName matches a key in
# [scopes]/[scope_ips] and <n> is the scope channel number. Value is free text.
BdotScope_C1 = Bdot diagnostic channel 1
BdotScope_C2 = Bdot diagnostic channel 2
BdotScope_C3 = Bdot diagnostic channel 3
BdotScope_C4 = Bdot diagnostic channel 4
XrayScope_C1 = X-ray diagnostic channel 1
XrayScope_C2 = X-ray diagnostic channel 2
XrayScope_C3 = X-ray diagnostic channel 3
XrayScope_C4 = X-ray diagnostic channel 4

[scope_ips]
# Bare scope IP addresses, one per scope key from [scopes]. No quotes.
BdotScope = 192.168.7.63
XrayScope = 192.168.7.64


# =============================================================================
# LEGACY SECTIONS BELOW
# Used by the older direct-grid / camera modes (--mode grid/camera/dropper),
# NOT by the bmotion workflow (Data_Run_bmotion.py). Safe to ignore for bmotion.
# =============================================================================

[camera_config]
# Legacy: used only by --mode camera / --mode dropper / the camera hardware
# diagnostic. Ignored by stationary/grid and bmotion paths.
exposure_us = 30
fps = 10000
pre_trigger_frames = -500
post_trigger_frames = 1000
# resolution is width,height (comma-separated, no parentheses).
resolution = 256,256

[raspberry_pi]
# Legacy: Raspberry Pi trigger settings for --mode dropper. Edit before use.
pi_host = 192.168.7.38
pi_port = 54321

[position]
# Legacy: programs the motor for --mode grid WITHOUT bmotion. Integers/floats
# only; no quotes. This diagnostic default creates one position: shot_1 at
# x=0 cm, y=0 cm. Change these only after confirming the target is safe for the
# installed probe and motor geometry.
#
# 2D vs 3D is decided by presence of z keys: include nz/zmin/zmax for a 3D
# (xyz) scan; omit them (as below) for a 2D (xy) scan.
nx = 1
ny = 1
xmin = 0
xmax = 0
ymin = 0
ymax = 0

# Example full XY scan values. Copy these over the diagnostic values above
# when you are ready to run a real grid scan.
# nx = 31
# ny = 41
# xmin = -15
# xmax = 15
# ymin = -20
# ymax = 20

# Example 3D extension (uncomment all three to switch to a 3D scan).
# nz = 11
# zmin = -5
# zmax = 5

[motor_ips]
# Legacy: direct motor-controller IPs used by --mode grid and data-run-motion.
# Bare IPs, one per axis. Keep comments on their own line.
x = 192.168.7.101
y = 192.168.7.102
# z = 192.168.7.103

# --- 45-degree probe notes (reference only; NOT implemented) ---
# 45-degree acquisition is not migrated in the current refactor branch and is
# not run by any current mode. These lines are kept only as a reference for the
# pre-refactor hardware PC workflow.
# probe_list = P16,P22,P29,P34,P42
# xstart = {"P16": -38, "P22": -18, "P29": -38, "P34": -38, "P42": -38}
# xstop = {"P16": -38, "P22": 18, "P29": -38, "P34": -38, "P42": -38}
