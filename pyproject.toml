[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "lapd-daq"
version = "0.1.0"
description = "LAPD experiment acquisition runner with an EPICS-ready device boundary."
requires-python = ">=3.10"
dependencies = [
    "h5py",
    "numpy",
    "tqdm",
]

[project.optional-dependencies]
scope = [
    "lab_scopes @ git+https://github.com/hjia94/lab_scopes.git",
    "pyvisa",
]
bmotion = [
    "bapsf-motion",
    "xarray",
]
camera = []

[project.scripts]
lapd-daq = "lapd_daq.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = [
    "acquisition*",
    "drivers*",
    "lapd_daq*",
    "motion*",
    "pi_gpio*",
]
